version: 2

project_name: betternas-node

builds:
  - id: betternas-node
    dir: apps/node-agent
    main: ./cmd/node-agent
    binary: betternas-node
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: betternas-node
    builds:
      - betternas-node
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
